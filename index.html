<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Item Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <article class="todo-card" data-testid="test-todo-card" aria-label="Todo item card">
        <header class="card-header">
          <div>
            <p class="eyebrow">Today</p>
            <h2 data-testid="test-todo-title" id="todo-title">Ship onboarding card redesign</h2>
          </div>
          <span
            class="priority priority-high"
            data-testid="test-todo-priority"
            aria-label="High priority"
          >
            High
          </span>
        </header>

        <p data-testid="test-todo-description" class="description">
          Finalize typography scale, spacing tokens, and responsive behavior for the first-run
          experience card.
        </p>

        <section class="meta-grid" aria-label="Task metadata">
          <div class="meta-item">
            <span class="meta-label">Due date</span>
            <time
              data-testid="test-todo-due-date"
              id="todo-due-date"
              datetime="2026-04-16T18:00:00.000Z"
            >
              Due Apr 16, 2026 at 6:00 PM UTC
            </time>
          </div>

          <div class="meta-item">
            <span class="meta-label">Time remaining</span>
            <time data-testid="test-todo-time-remaining" id="todo-time-remaining" aria-live="polite">
              Loading...
            </time>
          </div>

          <div class="meta-item">
            <span class="meta-label">Status</span>
            <span data-testid="test-todo-status" id="todo-status" class="status-badge" aria-label="Pending status">
              Pending
            </span>
          </div>
        </section>

        <div class="toggle-row">
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
          />
          <label for="todo-complete">Mark as complete</label>
        </div>

        <section aria-label="Task tags">
          <div class="meta-label">Tags</div>
          <ul data-testid="test-todo-tags" role="list" class="tag-list">
            <li data-testid="test-todo-tag-work" class="tag-chip">work</li>
            <li data-testid="test-todo-tag-urgent" class="tag-chip">urgent</li>
            <li class="tag-chip">design</li>
          </ul>
        </section>

        <footer class="actions">
          <button type="button" data-testid="test-todo-edit-button" id="todo-edit-button">Edit</button>
          <button type="button" data-testid="test-todo-delete-button" id="todo-delete-button">Delete</button>
        </footer>
      </article>
    </main>

    <script src="./app.js"></script>
  </body>
  </html>
